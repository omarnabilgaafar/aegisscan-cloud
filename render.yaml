services:
  - type: web
    name: aegisscan-cloud
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT 'app.main:create_app()'
    envVars:
      - key: DATABASE_PATH
        value: scanner.db
      - key: DEMO_MODE
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
